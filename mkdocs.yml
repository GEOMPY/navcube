site_name: GeomPy Documentation
repo_url: https://github.com/GEOMPY/geompy-display
repo_name: geompy-display
edit_uri: edit/main/docs/
use_directory_urls: false

theme:
  name: material
  features:
    - header.autohide
    - announce.dismiss

    - navigation.tabs
    - navigation.path
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.tracking

    - content.code.copy
    - content.code.annotate
    - content.tabs.link

    - toc.integrate
    - toc.follow

  palette:
  - scheme: default
    primary: green
    accent: light green
    toggle:
      icon: material/weather-night
      name: Dark mode

  - scheme: slate
    primary: black
    accent: light green
    toggle:
      icon: material/weather-sunny
      name: Light mode

  font:
    text: Roboto
    code: Fira Code


extra_css:
  - stylesheets/extra.css


nav:
  - Home: index.md
  - API Reference: api.md


plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_category_heading: true
            members_order: source

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.emoji
